<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <title>SPOT CHECK - 1225 LOBBY BAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        input, textarea { user-select: text !important; -webkit-user-select: text !important; touch-action: auto !important; }
        #main-scroll { overflow: auto; position: relative; background-color: #e2e8f0; }
        #map-container { height: 1200px; width: 2000px; position: relative; background-color: #ffffff; }
        .design-grid { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 30px 30px; }
        .mesa {
            position: absolute; z-index: 10; display: flex; align-items: center; justify-content: center;
            font-weight: 800; border-radius: 12px; transition: all 0.2s; cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); user-select: none; font-size: 13px;
        }
        .mesa-free { background-color: #ffffff; color: #64748b; border: 2px solid #e2e8f0; }
        .mesa-occupied { background-color: #000000 !important; color: #ffffff !important; border: 2px solid #000000 !important; }
        .screen-overlay { position: fixed; left: 0; right: 0; bottom: 0; top: 205px; background-color: #f8fafc; z-index: 30; overflow-y: auto; display: none; padding-bottom: 140px; }
        .screen-overlay.active { display: flex; }
        #toast { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) translateY(100px); transition: transform 0.3s; z-index: 1000; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden select-none text-slate-900">

    <header class="bg-slate-950 text-white p-5 pt-12 flex justify-between items-center shrink-0 z-[60] shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center transform -rotate-3">
                <i class="fa-solid fa-layer-group text-slate-950 text-xl"></i>
            </div>
            <div>
                <h1 class="font-black text-xl italic leading-none tracking-tighter">SPOT CHECK</h1>
                <p class="text-[8px] text-slate-400 font-black tracking-widest uppercase mt-1">1225 LOBBY BAR</p>
            </div>
        </div>
        <button onclick="toggleLock()" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center border border-slate-800">
            <i class="fa-solid fa-lock text-red-500" id="lock-icon"></i>
        </button>
    </header>

    <div class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex gap-6">
            <div><span class="text-[8px] font-black text-slate-400 uppercase block">Ocupadas</span><span id="stat-occupied" class="text-xl font-black">0</span></div>
            <div class="border-l border-slate-100 pl-6"><span class="text-[8px] font-black text-slate-400 uppercase block">Ratio</span><span id="stat-percent" class="text-xl font-black text-emerald-600">0%</span></div>
        </div>
        <p id="current-time" class="text-[10px] font-black uppercase">00:00</p>
    </div>

    <nav class="px-4 py-3 bg-slate-50 flex gap-2 border-b border-slate-200 shrink-0">
        <div class="flex w-full bg-slate-200/50 p-1 rounded-2xl">
            <button onclick="setMode('audit')" id="nav-audit" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase bg-white shadow-sm">Auditar</button>
            <button onclick="setMode('design')" id="nav-design" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400">Diseño</button>
            <button onclick="setMode('notes')" id="nav-notes" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400">Reporte</button>
            <button onclick="setMode('history')" id="nav-history" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400">Historial</button>
        </div>
    </nav>

    <main class="flex-1 overflow-hidden relative" id="main-scroll">
        <div id="map-container">
            <div class="absolute top-10 left-[750px] text-slate-200 font-black text-5xl opacity-30 pointer-events-none tracking-[1em]">BARRA</div>
            <div id="mesas-layer" class="w-full h-full relative"></div>
        </div>
        <button id="btn-add-mesa" onclick="openModal('add-modal')" class="hidden fixed right-8 bottom-32 w-16 h-16 bg-slate-950 text-emerald-400 rounded-full shadow-2xl items-center justify-center z-[80] border-4 border-white active:scale-90">
            <i class="fa-solid fa-plus text-xl"></i>
        </button>
    </main>

    <div id="notes-screen" class="screen-overlay flex-col p-6">
        <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-200 max-w-md mx-auto w-full space-y-6">
            <h3 class="text-sm font-black uppercase text-center italic tracking-tighter">Conciliación de Sistema</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-2 tracking-widest">In Situ</label>
                    <input id="note-insitu" type="number" readonly class="w-full h-16 bg-slate-100 rounded-2xl px-6 font-black text-xl text-center">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black uppercase text-emerald-500 ml-2 tracking-widest">Sistema POS</label>
                    <input id="note-micros" type="number" placeholder="0" class="w-full h-16 bg-white border-2 border-emerald-500 rounded-2xl px-6 font-black text-xl text-center outline-none">
                </div>
            </div>
            <button onclick="saveAudit()" class="w-full h-16 bg-slate-950 text-white rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">
                Guardar Auditoría
            </button>
        </div>
    </div>

    <div id="history-screen" class="screen-overlay flex-col p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black italic uppercase">Historial</h2>
            <button onclick="clearHistory()" class="text-[10px] font-black uppercase text-red-500">Borrar Todo</button>
        </div>
        <div id="history-list" class="space-y-4"></div>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center z-[200] p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8">
            <h3 id="modal-title" class="text-2xl font-black mb-6 uppercase italic">Elemento</h3>
            <input type="text" id="new-label" placeholder="ETIQUETA" class="w-full h-14 bg-slate-100 rounded-2xl px-6 font-bold text-lg mb-4 outline-none uppercase">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <input type="number" id="new-w" placeholder="Ancho" class="w-full h-12 bg-slate-50 border rounded-xl text-center font-bold">
                <input type="number" id="new-h" placeholder="Alto" class="w-full h-12 bg-slate-50 border rounded-xl text-center font-bold">
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal('add-modal')" class="flex-1 h-14 bg-slate-100 rounded-2xl font-black uppercase text-slate-400">Cerrar</button>
                <button onclick="confirmMesa()" class="flex-1 h-14 bg-slate-950 rounded-2xl font-black uppercase text-emerald-400">Guardar</button>
            </div>
            <button id="btn-delete-mesa" onclick="deleteMesa()" class="w-full mt-6 text-red-500 font-black text-[10px] uppercase hidden">Eliminar Elemento</button>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex gap-3 z-[100]">
        <button onclick="clearCurrentAudit()" class="w-14 h-14 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center active:scale-90"><i class="fa-solid fa-rotate-left"></i></button>
        <input type="file" id="ocr-camera-input" accept="image/*" capture="environment" class="hidden" onchange="processImageOCR(event)">
        <button onclick="document.getElementById('ocr-camera-input').click()" class="flex-1 bg-slate-950 text-emerald-400 h-14 rounded-3xl font-black uppercase flex items-center justify-center gap-2 shadow-2xl active:scale-95">
            <i id="ocr-icon" class="fa-solid fa-camera"></i> <span id="ocr-text">SCAN</span>
        </button>
        <button onclick="setMode('notes')" class="flex-1 bg-emerald-500 text-slate-950 h-14 rounded-3xl font-black uppercase shadow-xl active:scale-95">Finalizar</button>
    </footer>

    <div id="toast" class="bg-slate-950 text-white px-8 py-4 rounded-3xl font-bold text-xs shadow-2xl flex items-center gap-3">
        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
        <span id="toast-msg">Mensaje</span>
    </div>

    <script>
        const DB_PREFIX = 'spotcheck_1225_final';
        let tables = JSON.parse(localStorage.getItem(`${DB_PREFIX}_tables`)) || [];
        let audits = JSON.parse(localStorage.getItem(`${DB_PREFIX}_audits`)) || [];
        let currentMode = 'audit', isLocked = true, editingMesaId = null;

        function init() {
            if (tables.length === 0) createInitialMap();
            render();
            setInterval(() => document.getElementById('current-time').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 1000);
            const scroll = document.getElementById('main-scroll');
            scroll.scrollLeft = 500; scroll.scrollTop = 100;
        }

        function createInitialMap() {
            const layout = [
                // Arriba Barra
                {id:1, label:'1', x:750, y:80, w:55, h:55}, {id:2, label:'2', x:820, y:80, w:55, h:55}, {id:3, label:'3', x:890, y:80, w:55, h:55},
                // Laterales Izquierda
                {id:40, label:'40', x:150, y:80, w:80, h:55}, {id:41, label:'41', x:150, y:250, w:80, h:55}, {id:42, label:'42', x:150, y:450, w:80, h:55},
                // Módulo Central (TVs)
                {id:4, label:'4', x:750, y:250, w:60, h:60}, {id:5, label:'5', x:820, y:250, w:60, h:60}, {id:6, label:'6', x:890, y:250, w:60, h:60}, {id:7, label:'7', x:960, y:250, w:60, h:60},
                {id:8, label:'8', x:1100, y:350, w:60, h:60}, {id:9, label:'9', x:1180, y:350, w:60, h:60},
                // Mesas 30s
                {id:30, label:'30', x:550, y:500, w:60, h:60}, {id:31, label:'31', x:550, y:650, w:60, h:60}, {id:33, label:'33', x:400, y:450, w:60, h:60},
                // Entrada
                {id:22, label:'22', x:850, y:800, w:60, h:60}, {id:23, label:'23', x:780, y:800, w:60, h:60}
            ];
            tables = layout.map(t => ({...t, status:'free'}));
            saveData();
        }

        function render() {
            const layer = document.getElementById('mesas-layer'); layer.innerHTML = '';
            let count = 0;
            tables.forEach(t => {
                if(t.status === 'occupied') count++;
                const div = document.createElement('div');
                div.className = `mesa ${t.status === 'occupied' ? 'mesa-occupied' : 'mesa-free'}`;
                div.style.cssText = `left:${t.x}px; top:${t.y}px; width:${t.w}px; height:${t.h}px;`;
                div.innerText = t.label;
                div.onclick = () => {
                    if(currentMode === 'audit') { t.status = t.status === 'free' ? 'occupied' : 'free'; render(); saveData(); }
                    else if(currentMode === 'design') { openEditMesa(t); }
                };
                if(currentMode === 'design') {
                    div.onmousedown = (e) => startDrag(e, t);
                    div.ontouchstart = (e) => startDrag(e, t);
                }
                layer.appendChild(div);
            });
            document.getElementById('stat-occupied').innerText = count;
            document.getElementById('stat-percent').innerText = tables.length ? Math.round((count/tables.length)*100)+'%' : '0%';
            document.getElementById('note-insitu').value = count;
        }

        function startDrag(e, t) {
            const ev = e.touches ? e.touches[0] : e;
            let startX = ev.clientX, startY = ev.clientY;
            const move = (me) => {
                const mev = me.touches ? me.touches[0] : me;
                t.x += (mev.clientX - startX); t.y += (mev.clientY - startY);
                startX = mev.clientX; startY = mev.clientY;
                render();
            };
            const end = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', end); window.removeEventListener('touchmove', move); window.removeEventListener('touchend', end); saveData(); };
            window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
            window.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', end);
        }

        function openEditMesa(t) {
            editingMesaId = t.id;
            document.getElementById('modal-title').innerText = "Editar Mesa";
            document.getElementById('new-label').value = t.label;
            document.getElementById('new-w').value = t.w;
            document.getElementById('new-h').value = t.h;
            document.getElementById('btn-delete-mesa').style.display = 'block';
            openModal('add-modal');
        }

        function confirmMesa() {
            const label = document.getElementById('new-label').value.toUpperCase();
            const w = parseInt(document.getElementById('new-w').value) || 60;
            const h = parseInt(document.getElementById('new-h').value) || 60;
            if(editingMesaId) {
                const t = tables.find(x => x.id === editingMesaId);
                t.label = label; t.w = w; t.h = h;
            } else {
                tables.push({ id: Date.now(), label, x: 800, y: 400, w, h, status: 'free' });
            }
            saveData(); render(); closeModal('add-modal');
        }

        function deleteMesa() { if(confirm("¿Eliminar?")) { tables = tables.filter(x => x.id !== editingMesaId); saveData(); render(); closeModal('add-modal'); } }

        function saveAudit() {
            const insitu = parseInt(document.getElementById('note-insitu').value);
            const micros = parseInt(document.getElementById('note-micros').value) || 0;
            const audit = { 
                id: Date.now(), 
                date: new Date().toLocaleDateString(), 
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
                insitu, micros, diff: insitu - micros, 
                details: tables.filter(t => t.status === 'occupied').map(t => t.label).join(', ') 
            };
            audits.unshift(audit); saveData(); showToast("Reporte Guardado"); setMode('history');
            tables.forEach(t => t.status = 'free'); render();
        }

        function downloadAuditTXT(id) {
            const a = audits.find(x => x.id === id);
            const content = `==================================================
       REPORTE DE AUDITORÍA SPOT CHECK (TXT)
==================================================
FECHA: ${a.date}
HORA: ${a.time}
SECTOR EVALUADO: 1225 LOBBY BAR
AUDITOR RESPONSABLE: AUDITOR
--------------------------------------------------
MESAS OCUPADAS EN PLANO (IN SITU): ${a.insitu}
MESAS EN SISTEMA DE VENTAS (POS):  ${a.micros}
CONCILIACIÓN / DISCREPANCIA:      ${a.diff}
--------------------------------------------------
DETALLE DE MESAS ACTIVAS ENCONTRADAS:
${a.details ? a.details.split(', ').map(label => `  - Mesa ${label}: [OCUPADA]`).join('\n') : '  - Sin mesas ocupadas'}
--------------------------------------------------
OBSERVACIONES Y DESCARGOS:
Sin observaciones.
==================================================
Generado por el Sistema de Control SPOT CHECK`;
            const blob = new Blob([content], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `SPOTCHECK_Reporte_${a.date.replace(/\//g, '-')}.txt`;
            link.click();
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = audits.map(a => `
                <div class="bg-white p-6 rounded-[32px] border shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-emerald-500 uppercase">${a.date} • ${a.time}</p>
                        <h4 class="text-xl font-black italic">${a.insitu} vs ${a.micros}</h4>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="downloadAuditTXT(${a.id})" class="w-10 h-10 bg-slate-50 border rounded-xl flex items-center justify-center"><i class="fa-solid fa-file-arrow-down"></i></button>
                        <button onclick="deleteAudit(${a.id})" class="w-10 h-10 bg-slate-50 border text-red-500 rounded-xl flex items-center justify-center"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `).join('') || '<p class="text-center py-20 opacity-20 font-black italic">VACÍO</p>';
        }

        function setMode(m) {
            currentMode = m;
            ['audit', 'design', 'notes', 'history'].forEach(id => {
                document.getElementById('nav-'+id).className = m === id ? "flex-1 py-3 rounded-xl font-black text-[10px] uppercase bg-white shadow-sm text-slate-900" : "flex-1 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400";
            });
            document.getElementById('map-container').className = m === 'design' ? "design-grid" : "";
            document.getElementById('btn-add-mesa').style.display = m === 'design' ? 'flex' : 'none';
            document.getElementById('notes-screen').classList.toggle('active', m === 'notes');
            document.getElementById('history-screen').classList.toggle('active', m === 'history');
            if(m === 'history') renderHistory();
            render();
        }

        function toggleLock() { isLocked = !isLocked; document.getElementById('lock-icon').className = isLocked ? "fa-solid fa-lock text-red-500" : "fa-solid fa-lock-open text-emerald-500"; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; if(id==='add-modal' && !editingMesaId) { document.getElementById('modal-title').innerText = "Nuevo"; document.getElementById('new-label').value = ""; document.getElementById('btn-delete-mesa').style.display = 'none'; } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; editingMesaId = null; }
        function showToast(msg) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function saveData() { localStorage.setItem(`${DB_PREFIX}_tables`, JSON.stringify(tables)); localStorage.setItem(`${DB_PREFIX}_audits`, JSON.stringify(audits)); }
        function deleteAudit(id) { if(confirm("¿Eliminar?")) { audits = audits.filter(a => a.id !== id); saveData(); renderHistory(); } }
        function clearHistory() { if(confirm("¿Borrar todo?")) { audits = []; saveData(); renderHistory(); } }
        function clearCurrentAudit() { if(confirm("¿Limpiar?")) { tables.forEach(t => t.status = 'free'); render(); saveData(); } }

        init();
    </script>
</body>
</html>
