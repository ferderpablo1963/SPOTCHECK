<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <title>SPOT CHECK - CONTROL PROFESIONAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            overscroll-behavior: none; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
        }
        
        input, textarea {
            user-select: text !important;
            -webkit-user-select: text !important;
            touch-action: auto !important;
        }
        
        #main-scroll {
            overflow: auto;
            position: relative;
            background-color: #e2e8f0;
        }

        #map-container { 
            height: 1200px; 
            width: 2000px;
            position: relative;
            background-color: #ffffff;
            transition: all 0.3s ease;
        }

        .mesa {
            position: absolute;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            user-select: none;
            font-size: 14px;
            text-transform: uppercase;
        }

        .mesa-free { background-color: #ffffff; color: #64748b; border: 2px solid #e2e8f0; }
        .mesa-occupied { background-color: #000000 !important; color: #ffffff !important; border: 2px solid #000000 !important; }

        .screen-overlay {
            position: fixed;
            left: 0; right: 0; bottom: 0; top: 205px;    
            background-color: #f8fafc;
            z-index: 30;   
            overflow-y: auto;
            display: none;
            padding-bottom: 120px; 
        }
        .screen-overlay.active { display: flex; }

        #toast {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden select-none text-slate-900">

    <header class="bg-slate-950 text-white p-5 pt-12 flex justify-between items-center shrink-0 z-[60] shadow-2xl border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center transform -rotate-3">
                <i class="fa-solid fa-layer-group text-slate-950 text-xl"></i>
            </div>
            <div>
                <h1 class="font-black text-xl italic leading-none tracking-tighter">SPOT CHECK</h1>
                <p class="text-[8px] text-slate-400 font-black tracking-widest uppercase mt-1">Control Profesional</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleLock()" class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center border border-slate-800 active:scale-90 transition-transform">
                <i class="fa-solid fa-lock text-red-500" id="lock-icon"></i>
            </button>
        </div>
    </header>

    <div class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex gap-6">
            <div>
                <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-1">Ocupadas</span>
                <span id="stat-occupied" class="text-xl font-black leading-none text-slate-950">0</span>
            </div>
            <div class="border-l border-slate-100 pl-6">
                <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-1">Ratio</span>
                <span id="stat-percent" class="text-xl font-black leading-none text-emerald-600">0%</span>
            </div>
        </div>
        <p id="current-time" class="text-[10px] font-black text-slate-950 uppercase">00:00:00</p>
    </div>

    <nav class="px-4 py-3 bg-slate-50 flex gap-2 border-b border-slate-200 shrink-0">
        <div class="flex w-full bg-slate-200/50 p-1 rounded-2xl">
            <button onclick="setMode('audit')" id="nav-audit" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase bg-white shadow-sm">Auditar</button>
            <button onclick="setMode('notes')" id="nav-notes" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400">Reporte</button>
            <button onclick="setMode('history')" id="nav-history" class="flex-1 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400">Historial</button>
        </div>
    </nav>

    <main class="flex-1 overflow-hidden relative" id="main-scroll">
        <div id="map-container">
            <div id="mesas-layer" class="w-full h-full relative"></div>
        </div>
    </main>

    <div id="notes-screen" class="screen-overlay flex-col p-6">
        <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-200 max-w-md mx-auto w-full space-y-6">
            <div class="text-center">
                <i class="fa-solid fa-file-invoice text-emerald-500 text-3xl mb-3"></i>
                <h3 class="text-xl font-black uppercase italic tracking-tighter">Conciliación POS</h3>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-2">Mesas In Situ (Plano)</label>
                    <input id="note-insitu" type="number" readonly class="w-full h-16 bg-slate-100 rounded-2xl px-6 font-black text-xl text-slate-900 border-none outline-none">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-emerald-500 ml-2">Mesas en Sistema (POS)</label>
                    <input id="note-micros" type="number" placeholder="0" class="w-full h-16 bg-white border-2 border-emerald-500 rounded-2xl px-6 font-black text-xl text-slate-900 outline-none focus:ring-4 ring-emerald-500/10 transition-all">
                </div>
            </div>

            <button onclick="saveAudit()" class="w-full h-16 bg-slate-950 text-emerald-400 rounded-2xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all">
                Generar y Guardar Reporte
            </button>
        </div>
    </div>

    <div id="history-screen" class="screen-overlay flex-col p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black italic tracking-tighter text-slate-950">HISTORIAL<span class="text-emerald-500 text-4xl">.</span></h2>
            <button onclick="clearHistory()" class="text-[10px] font-black uppercase text-red-500">Borrar Todo</button>
        </div>
        <div id="history-list" class="space-y-4"></div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 flex gap-3 z-[100]">
        <button onclick="clearCurrentAudit()" class="w-14 h-14 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center active:scale-90 transition-transform">
            <i class="fa-solid fa-rotate-left"></i>
        </button>
        
        <input type="file" id="ocr-camera-input" accept="image/*" capture="environment" class="hidden" onchange="processImageOCR(event)">
        
        <button onclick="document.getElementById('ocr-camera-input').click()" class="flex-1 bg-slate-950 text-emerald-400 h-14 rounded-3xl font-black uppercase flex items-center justify-center gap-2 shadow-2xl active:scale-95 transition-all">
            <i id="ocr-icon" class="fa-solid fa-camera text-xs"></i> <span id="ocr-text">SCAN</span>
        </button>
        
        <button onclick="setMode('notes')" class="flex-1 bg-emerald-500 text-slate-950 h-14 rounded-3xl font-black uppercase shadow-xl active:scale-95 transition-all">
            Cerrar Control
        </button>
    </footer>

    <div id="toast" class="bg-slate-950 text-white px-8 py-4 rounded-3xl font-bold text-xs shadow-2xl flex items-center gap-3">
        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
        <span id="toast-msg">Mensaje</span>
    </div>

    <script>
        const DB_PREFIX = 'spotcheck_v3';
        // Mesas por defecto si no existen
        let tables = JSON.parse(localStorage.getItem(`${DB_PREFIX}_tables`)) || [
            { id: 1, label: '1', x: 900, y: 500, w: 70, h: 70, status: 'free' },
            { id: 2, label: '22', x: 1000, y: 500, w: 70, h: 70, status: 'free' },
            { id: 3, label: '42', x: 1100, y: 500, w: 70, h: 70, status: 'free' }
        ];
        let audits = JSON.parse(localStorage.getItem(`${DB_PREFIX}_audits`)) || [];
        let isLocked = true;
        let currentMode = 'audit';

        function init() {
            render();
            updateTime();
            setInterval(updateTime, 1000);
            const scroll = document.getElementById('main-scroll');
            scroll.scrollLeft = 850; scroll.scrollTop = 400;
        }

        function updateTime() { document.getElementById('current-time').innerText = new Date().toTimeString().split(' ')[0]; }

        function render() {
            const layer = document.getElementById('mesas-layer');
            layer.innerHTML = '';
            let count = 0;
            tables.forEach(t => {
                if(t.status === 'occupied') count++;
                const div = document.createElement('div');
                div.className = `mesa ${t.status === 'occupied' ? 'mesa-occupied' : 'mesa-free'}`;
                div.style.left = t.x + 'px'; div.style.top = t.y + 'px';
                div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                div.innerText = t.label;
                div.onclick = () => { if(currentMode === 'audit') { t.status = t.status === 'free' ? 'occupied' : 'free'; render(); saveData(); } };
                layer.appendChild(div);
            });
            document.getElementById('stat-occupied').innerText = count;
            document.getElementById('stat-percent').innerText = tables.length ? Math.round((count/tables.length)*100)+'%' : '0%';
            document.getElementById('note-insitu').value = count;
        }

        async function processImageOCR(event) {
            const file = event.target.files[0];
            if (!file) return;
            const icon = document.getElementById('ocr-icon');
            const textSpan = document.getElementById('ocr-text');
            icon.className = "fa-solid fa-circle-notch animate-spin text-emerald-400";
            textSpan.innerText = "LEYENDO...";

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    Tesseract.recognize(img, 'eng').then(({ data: { text } }) => {
                        const detected = text.match(/\d+/g) || [];
                        let matched = 0;
                        tables.forEach(t => {
                            if(detected.includes(t.label)) { t.status = 'occupied'; matched++; }
                        });
                        showToast(matched > 0 ? `Detectadas ${matched} mesas` : "No se detectaron mesas");
                        render(); saveData();
                    }).finally(() => {
                        icon.className = "fa-solid fa-camera text-xs";
                        textSpan.innerText = "SCAN";
                    });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveAudit() {
            const insitu = parseInt(document.getElementById('note-insitu').value);
            const micros = parseInt(document.getElementById('note-micros').value) || 0;
            const occupiedLabels = tables.filter(t => t.status === 'occupied').map(t => t.label);

            const auditData = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                insitu: insitu,
                micros: micros,
                diff: insitu - micros,
                details: occupiedLabels.join(', ')
            };

            audits.unshift(auditData);
            saveData();
            showToast("Reporte Guardado");
            document.getElementById('note-micros').value = '';
            setMode('history');
            tables.forEach(t => t.status = 'free');
            render();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = audits.map(a => `
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">${a.date} • ${a.time}</p>
                            <h4 class="text-xl font-black italic text-slate-950">${a.insitu} VS ${a.micros} (DIFF: ${a.diff})</h4>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="downloadAuditTXT(${a.id})" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center hover:text-emerald-600 transition-colors">
                                <i class="fa-solid fa-file-arrow-down"></i>
                            </button>
                            <button onclick="deleteAudit(${a.id})" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center hover:text-red-500 transition-colors">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase bg-slate-50 p-3 rounded-xl">Mesas: ${a.details || 'Ninguna'}</p>
                </div>
            `).join('') || '<p class="text-center py-20 opacity-20 font-black italic uppercase">Historial Vacío</p>';
        }

        function downloadAuditTXT(id) {
            const a = audits.find(x => x.id === id);
            const content = `==================================================
       REPORTE DE AUDITORÍA SPOT CHECK (TXT)
==================================================
FECHA: ${a.date}
HORA: ${a.time}
AUDITOR RESPONSABLE: AUDITOR
--------------------------------------------------
MESAS OCUPADAS EN PLANO (IN SITU): ${a.insitu}
MESAS EN SISTEMA DE VENTAS (POS):  ${a.micros}
CONCILIACIÓN / DISCREPANCIA:      ${a.diff}
--------------------------------------------------
DETALLE DE MESAS ACTIVAS ENCONTRADAS:
${a.details.split(', ').map(label => `  - Mesa ${label}: [OCUPADA]`).join('\n')}
--------------------------------------------------
OBSERVACIONES Y DESCARGOS:
Sin observaciones.
==================================================
Generado por el Sistema de Control SPOT CHECK`;

            const blob = new Blob([content], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `Reporte_${a.date.replace(/\//g, '-')}_${a.id}.txt`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function setMode(m) {
            currentMode = m;
            ['audit', 'notes', 'history'].forEach(id => {
                document.getElementById('nav-'+id).className = m === id ? "flex-1 py-3 rounded-xl font-black text-[10px] uppercase bg-white shadow-sm text-slate-950" : "flex-1 py-3 rounded-xl font-black text-[10px] uppercase text-slate-400";
            });
            document.getElementById('notes-screen').classList.toggle('active', m === 'notes');
            document.getElementById('history-screen').classList.toggle('active', m === 'history');
            if(m === 'history') renderHistory();
            render();
        }

        function toggleLock() { isLocked = !isLocked; document.getElementById('lock-icon').className = isLocked ? "fa-solid fa-lock text-red-500" : "fa-solid fa-lock-open text-emerald-500"; showToast(isLocked ? "Bloqueado" : "Libre"); }
        function showToast(msg) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function saveData() { localStorage.setItem(`${DB_PREFIX}_tables`, JSON.stringify(tables)); localStorage.setItem(`${DB_PREFIX}_audits`, JSON.stringify(audits)); }
        function clearCurrentAudit() { if(confirm("¿Limpiar mesas actuales?")) { tables.forEach(t => t.status = 'free'); render(); saveData(); } }
        function deleteAudit(id) { if(confirm("¿Eliminar reporte?")) { audits = audits.filter(a => a.id !== id); saveData(); renderHistory(); } }
        function clearHistory() { if(confirm("¿Borrar todo el historial?")) { audits = []; saveData(); renderHistory(); } }

        init();
    </script>
</body>
</html>
